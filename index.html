<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoomyBoom · 오늘의 시장 브리핑</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#141922; --panel2:#1b2230; --border:#26303f;
    --text:#e6edf3; --muted:#8b98a9; --accent:#4c8dff;
    --up:#3fb37f; --down:#e5534b; --chip:#20293a;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f5f7fa; --panel:#ffffff; --panel2:#f0f3f8; --border:#e2e8f0;
      --text:#1a2230; --muted:#5b6675; --accent:#2563eb; --up:#137a4f; --down:#c0392b; --chip:#eef2f7;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",Roboto,"Malgun Gothic",sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:860px;margin:0 auto;padding:24px 18px 80px}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;
    padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:22px}
  h1{font-size:1.35rem;margin:0;letter-spacing:-.02em}
  h1 .dot{color:var(--accent)}
  .sub{color:var(--muted);font-size:.85rem}
  select{background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:6px 10px;font-size:.85rem}
  .headline{font-size:1.05rem;font-weight:600;background:var(--panel);border:1px solid var(--border);
    border-left:3px solid var(--accent);border-radius:10px;padding:14px 16px;margin-bottom:22px}
  section{background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:16px 18px;margin-bottom:16px}
  section h2{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    margin:0 0 12px}
  .indices{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
  .idx{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;min-width:120px}
  .idx .n{font-size:.75rem;color:var(--muted)}
  .idx .v{font-size:1rem;font-weight:600}
  .pct-up{color:var(--up)} .pct-down{color:var(--down)}
  .macro-line{margin:6px 0}
  .macro-line b{color:var(--muted);font-weight:600;font-size:.82rem}
  .chip{display:inline-block;background:var(--chip);border:1px solid var(--border);border-radius:999px;
    padding:2px 9px;font-size:.75rem;margin:2px 4px 2px 0;color:var(--muted)}
  .item{padding:10px 0;border-top:1px solid var(--border)}
  .item:first-child{border-top:none}
  .item .t{font-weight:600}
  .item .meta{font-size:.85rem;color:var(--muted);margin-top:2px}
  .spot{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .spot .name{font-weight:700;font-size:1rem}
  .spot .mkt{font-size:.7rem;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:1px 6px;margin-left:6px}
  .levels{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .level{font-size:.8rem;background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:4px 9px}
  .level b{color:var(--muted)}
  .risk{font-size:.82rem;color:var(--down);margin-top:6px}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .src{font-size:.75rem}
  .disclaimer{font-size:.78rem;color:var(--muted);background:var(--panel2);border:1px dashed var(--border);
    border-radius:10px;padding:12px 14px;margin-top:20px}
  .empty{color:var(--muted);text-align:center;padding:60px 0}
  footer{text-align:center;color:var(--muted);font-size:.75rem;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Boomy<span class="dot">·</span>Boom 시장 브리핑</h1>
      <div class="sub" id="gen">불러오는 중…</div>
    </div>
    <select id="datesel" aria-label="날짜 선택"></select>
  </header>
  <div id="content"><div class="empty">브리핑을 불러오는 중…</div></div>
  <footer>매일 아침 08:00 KST 자동 업데이트 · 정보 제공용</footer>
</div>

<script>
const $ = s => document.querySelector(s);
const pctClass = p => {
  if(!p) return "";
  const s = String(p).trim();
  if(s.startsWith("-")) return "pct-down";
  if(s.startsWith("+") || parseFloat(s) > 0) return "pct-up";
  return "";
};
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

async function loadManifest(){
  const r = await fetch("briefs/manifest.json?_=" + Date.now());
  return r.json();
}
async function loadBrief(date){
  const r = await fetch(`briefs/${date}.json?_=` + Date.now());
  return r.json();
}

function render(b){
  const el = $("#content");
  if(!b){ el.innerHTML = '<div class="empty">아직 브리핑이 없습니다.<br>매일 아침 8시에 생성됩니다.</div>'; return; }
  let h = "";
  if(b.headline) h += `<div class="headline">${esc(b.headline)}</div>`;

  // macro
  const m = b.macro || {};
  let macroInner = "";
  if((m.indices||[]).length){
    macroInner += '<div class="indices">' + m.indices.map(i =>
      `<div class="idx"><div class="n">${esc(i.name)}</div><div class="v">${esc(i.value)} <span class="${pctClass(i.change_pct)}">${esc(i.change_pct)}</span></div></div>`
    ).join("") + '</div>';
  }
  if(m.us_close) macroInner += `<div class="macro-line"><b>미국장 마감</b> · ${esc(m.us_close)}</div>`;
  if(m.kr_preview) macroInner += `<div class="macro-line"><b>한국장 프리뷰</b> · ${esc(m.kr_preview)}</div>`;
  if(m.rates_fx_commodities) macroInner += `<div class="macro-line"><b>금리·환율·원자재</b> · ${esc(m.rates_fx_commodities)}</div>`;
  if(m.notes) macroInner += `<div class="macro-line"><b>비고</b> · ${esc(m.notes)}</div>`;
  if(macroInner) h += `<section><h2>매크로</h2>${macroInner}</section>`;

  // themes
  if((b.top_themes||[]).length){
    h += '<section><h2>오늘의 주도 테마</h2>' + b.top_themes.map(t=>{
      const chips = (t.tickers||[]).map(x=>`<span class="chip">${esc(x)}</span>`).join("");
      const src = t.source_url?` <a class="src" href="${esc(t.source_url)}" target="_blank" rel="noopener">↗</a>`:"";
      return `<div class="item"><div class="t">${esc(t.theme)}${src}</div><div class="meta">${esc(t.summary)}</div><div>${chips}</div></div>`;
    }).join("") + '</section>';
  }

  // movers
  if((b.movers||[]).length){
    h += '<section><h2>주요 급등락</h2>' + b.movers.map(x=>{
      const src = x.source_url?` <a class="src" href="${esc(x.source_url)}" target="_blank" rel="noopener">↗</a>`:"";
      return `<div class="item"><div class="t">${esc(x.name||x.ticker)} <span class="${pctClass(x.change_pct)}">${esc(x.change_pct)}</span>${src}</div><div class="meta">${esc(x.reason)}</div></div>`;
    }).join("") + '</section>';
  }

  // spotlight
  if((b.spotlight||[]).length){
    h += '<section><h2>주목 종목 <span style="text-transform:none;font-weight:400">(정보 제공용)</span></h2>' + b.spotlight.map(s=>{
      const lv = s.levels_watched||{};
      let levels = "";
      if(lv.support) levels += `<span class="level"><b>지지</b> ${esc(lv.support)}</span>`;
      if(lv.resistance) levels += `<span class="level"><b>저항</b> ${esc(lv.resistance)}</span>`;
      if(lv.analyst_target_cited) levels += `<span class="level"><b>목표가</b> ${esc(lv.analyst_target_cited)}</span>`;
      const cats = (s.catalysts||[]).length?`<div class="meta">📅 ${s.catalysts.map(esc).join(" · ")}</div>`:"";
      const srcs = (s.sources||[]).map((u,i)=>`<a class="src" href="${esc(u)}" target="_blank" rel="noopener">출처${i+1}</a>`).join(" · ");
      return `<div class="spot"><div class="name">${esc(s.name||s.ticker)}<span class="mkt">${esc(s.market)}</span></div>
        <div class="meta">${esc(s.thesis)}</div>${cats}
        ${levels?`<div class="levels">${levels}</div>`:""}
        ${s.risk?`<div class="risk">⚠ 리스크: ${esc(s.risk)}</div>`:""}
        ${srcs?`<div class="meta" style="margin-top:6px">${srcs}</div>`:""}</div>`;
    }).join("") + '</section>';
  }

  // watchlist
  if((b.watchlist||[]).length){
    h += '<section><h2>관심 종목</h2>' + b.watchlist.map(w=>{
      const src = w.source_url?` <a class="src" href="${esc(w.source_url)}" target="_blank" rel="noopener">↗</a>`:"";
      return `<div class="item"><div class="t">${esc(w.name||w.ticker)}${src}</div><div class="meta">${esc(w.news||w.note)}</div></div>`;
    }).join("") + '</section>';
  }

  if(b.disclaimer) h += `<div class="disclaimer">${esc(b.disclaimer)}</div>`;
  el.innerHTML = h || '<div class="empty">브리핑 내용이 비어 있습니다.</div>';
}

(async function init(){
  try{
    const man = await loadManifest();
    const dates = man.dates || [];
    const sel = $("#datesel");
    if(!dates.length){ $("#gen").textContent="브리핑 없음"; render(null); return; }
    sel.innerHTML = dates.map(d=>`<option value="${d}">${d}</option>`).join("");
    async function show(d){
      $("#gen").textContent = "불러오는 중…";
      const b = await loadBrief(d);
      $("#gen").textContent = (b.generated_at_kst? "생성: "+b.generated_at_kst.replace("T"," ").slice(0,16) : d) + (b.mode?` · ${b.mode}`:"");
      render(b);
    }
    sel.addEventListener("change", e=>show(e.target.value));
    show(dates[0]);
  }catch(e){
    $("#gen").textContent="로드 실패";
    $("#content").innerHTML = '<div class="empty">브리핑을 불러오지 못했습니다.<br><small>'+esc(e.message)+'</small></div>';
  }
})();
</script>
</body>
</html>
